<svg xmlns="http://www.w3.org/2000/svg" width="950" height="520" viewBox="0 0 950 520">
  <rect width="100%" height="100%" fill="white"/>
  <text x="30" y="36" font-family="Arial" font-size="24">Sorcerer 125 DD style — assembly scheme</text>
  <text x="30" y="64" font-family="Arial" font-size="15">Two printed PETG/ASA halves + through-wire + ballast + 2 mm polycarbonate DD lip.</text>
  <path d="M120,230 C160,178 235,164 330,176 C450,190 598,191 722,207 C768,214 790,231 776,245 C750,267 657,276 552,276 C420,279 274,274 167,257 C134,252 118,242 120,230 Z" fill="#f6f6f6" stroke="black" stroke-width="2"/>
  <line x1="122" y1="230" x2="777" y2="244" stroke="#444" stroke-width="2" stroke-dasharray="10 5"/>
  <text x="390" y="315" font-family="Arial" font-size="15">glue seam / center plane</text>
  <polygon points="113,229 45,184 79,296" fill="#eeeeee" stroke="black" stroke-width="2"/>
  <circle cx="82" cy="231" r="6" fill="white" stroke="black" stroke-width="2"/>
  <line x1="82" y1="231" x2="770" y2="244" stroke="#222" stroke-width="3"/>
  <circle cx="300" cy="262" r="7" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="520" cy="274" r="7" fill="white" stroke="black" stroke-width="2"/>
  <circle cx="770" cy="244" r="7" fill="white" stroke="black" stroke-width="2"/>
  <rect x="245" y="238" width="115" height="18" rx="9" fill="#dddddd" stroke="#555"/>
  <text x="243" y="226" font-family="Arial" font-size="15">lead/tungsten ballast</text>
  <text x="180" y="125" font-family="Arial" font-size="15">1. Print left/right halves</text>
  <text x="180" y="150" font-family="Arial" font-size="15">2. Bend stainless through-wire 1.0–1.2 mm</text>
  <text x="180" y="175" font-family="Arial" font-size="15">3. Add ballast, glue halves, seal with epoxy/UV resin</text>
  <text x="180" y="200" font-family="Arial" font-size="15">4. Cut DD lip from 2 mm PC, tune line tie after test</text>
  <line x1="246" y1="391" x2="361" y2="391" stroke="black" stroke-width="1.5"/>
  <line x1="246" y1="386" x2="246" y2="396" stroke="black"/>
  <line x1="361" y1="386" x2="361" y2="396" stroke="black"/>
  <text x="247" y="416" font-family="Arial" font-size="15">ballast 3–6 g</text>
  <line x1="82" y1="438" x2="770" y2="438" stroke="black" stroke-width="1.5"/>
  <text x="382" y="465" font-family="Arial" font-size="16">assembled target: 20–24 g, slow floating</text>
</svg>
